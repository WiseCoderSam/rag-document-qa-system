version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
    environment:
      # Previously hardcoded to sqlite regardless of the host's real
      # DATABASE_URL, so "docker compose up" never actually exercised
      # Postgres even when that's what's configured for local/prod use.
      # Now it passes through the host env var, only falling back to
      # SQLite when DATABASE_URL isn't set at all.
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./sql_app.db}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-supersecretkeyfortestinglocalraglogmonitoring}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Avoid mounting node_modules & dist from host to container to prevent conflicts
      - /app/node_modules
      - /app/dist
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_SUPABASE_URL=${SUPABASE_URL:-}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    depends_on:
      - backend
    restart: always

volumes:
  backend_storage:
